<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fertig | Question Bank</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("fertig-theme");
        if (!theme) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>

  <!-- JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet" />

  <!-- Shared palette/tokens -->
  <link rel="stylesheet" href="/css/theme.css" />
  <!-- Page styles -->
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body class="topnav-page question-bank-page">
  <!-- Top App Bar -->
  <header class="appbar">
    <div class="appbar-row">
      <div class="appbar-left">
        <a class="brand-mini" href="home.html" aria-label="Fertig">
          <span class="brand-logo">F</span>
          <span class="brand-name">Fertig</span>
        </a>
      </div>

      <div class="appbar-center">
        <div id="welcome-name" class="appbar-title">Hey, Student</div>
      </div>

      <div class="appbar-right">
        <span id="meta-chip" class="meta-chip">Engineering • 2nd Year • CSE</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
        <div class="avatar" id="avatarMenu" aria-haspopup="true" aria-expanded="false">
          <span id="avatarInit">U</span>
          <div class="menu" id="userMenu" role="menu">
            <a href="profile.html" role="menuitem">Profile</a>
            <a href="about.html" role="menuitem">About Us</a>
            <a href="help.html" role="menuitem">Help</a>
            <button id="logout" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Navigation (replaces sidebar) -->
  <nav class="main-nav" id="mainNav">
    <div class="main-nav-inner">
      <a class="nav-link" href="home.html">Home</a>
      <a class="nav-link active" href="index.html">Question Bank</a>
      <a class="nav-link" href="tests_home.html">Tests</a>
      <a class="nav-link" href="study-material.html">Study Material</a>
      <span class="nav-spacer"></span>
      <span class="nav-tip">All subjects, one place.</span>
    </div>
  </nav>

  <!-- Floating geometric shapes -->
  <div class="geo-canvas" aria-hidden="true">
    <div class="geo geo--circle"></div>
    <div class="geo geo--diamond"></div>
    <div class="geo geo--triangle"></div>
    <div class="geo geo--ring"></div>
    <div class="geo geo--cross"></div>
    <div class="geo geo--dots"></div>
  </div>

  <!-- Main -->
  <main class="page" id="page">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-bg"></div>
      <!-- Floating geometric shapes in hero -->
      <div class="hero-shape hero-shape--1" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--2" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--3" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--4" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--5" aria-hidden="true"></div>
      <div class="container">
        <h1 class="hero-title">Your chapter‑wise PYQ hub</h1>
        <p class="hero-sub">Browse subjects by year.</p>
      </div>
    </section>

    <!-- Geometric color bar -->
    <div class="hero-geo-bar" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Year tabs + Back -->
    <section class="container section">
      <div class="year-switcher">
        <div class="year-tabs" id="yearTabs" role="tablist" aria-label="Years"></div>
        <button id="back-home-btn" class="link-btn hidden">← Back to current year</button>
      </div>

      <!-- Title -->
      <div class="section-head">
        <h2 class="section-title" id="subject-year-title">Subjects</h2>
      </div>

      <!-- Subject grid -->
      <div class="subject-grid" id="subject-list" role="tabpanel" aria-labelledby="yearTabs"></div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
