<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fertig | Profile</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("fertig-theme");
        if (!theme) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/info.css" />
</head>
<body class="topnav-page profile-page">
  <header class="appbar">
    <div class="appbar-row">
      <div class="appbar-left">
        <a class="brand-mini" href="home.html" aria-label="Fertig">
          <span class="brand-logo">F</span>
          <span class="brand-name">Fertig</span>
        </a>
      </div>

      <div class="appbar-center">
        <div id="welcome-name" class="appbar-title">Your Profile</div>
      </div>

      <div class="appbar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
        <div class="avatar" id="avatarMenu" aria-haspopup="true" aria-expanded="false">
          <span id="avatarInit">U</span>
          <div class="menu" id="userMenu" role="menu">
            <a href="profile.html" role="menuitem">Profile</a>
            <a href="help.html" role="menuitem">Help</a>
            <button id="logout" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <nav class="main-nav" id="mainNav">
    <div class="main-nav-inner">
      <a class="nav-link" href="home.html">Home</a>
      <a class="nav-link" href="index.html">Question Bank</a>
      <a class="nav-link" href="tests_home.html">Tests</a>
      <a class="nav-link" href="study-material.html">Study Material</a>
      <a class="nav-link" href="chatBot.html">Chatbot</a>
      <span class="nav-spacer"></span>
      <span class="nav-tip">Keep your profile up to date.</span>
    </div>
  </nav>

  <main class="page" id="page">
    <section class="hero info-hero">
      <div class="hero-bg"></div>
      <div class="container">
        <h1 class="hero-title">Profile</h1>
        <p class="hero-sub">Your account details and quick actions.</p>
      </div>
    </section>

    <section class="container section info-section">
      <div class="info-grid">
        <article class="info-card">
          <h2>Account</h2>
          <p id="profile-name">Name: -</p>
          <p id="profile-email">Email: -</p>
          <p id="profile-reg">Registration Number: -</p>
          <p id="profile-year">Year: -</p>
        </article>

        <article class="info-card">
          <h2>Quick Actions</h2>
          <div class="info-actions">
            <a class="link-btn" href="index.html">Open Question Bank</a>
            <a class="link-btn" href="tests_home.html">Go to Tests</a>
            <a class="link-btn" href="study-material.html">Open Study Material</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
