<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tests | Fertig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="/css/index.css"/><!-- reuse dashboard styles -->
</head>
<body class="topnav-page tests-page">
  <header class="appbar">
    <div class="appbar-row">
      <div class="appbar-left">
        <a class="brand-mini" href="home.html" aria-label="Fertig">
          <span class="brand-logo">F</span><span class="brand-name">Fertig</span>
        </a>
      </div>
      <div class="appbar-center"><div class="appbar-title">Pick a Test</div></div>
      <div class="appbar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
        <div class="avatar" id="avatarMenu" aria-haspopup="true" aria-expanded="false">
          <span id="avatarInit">U</span>
          <div class="menu" id="userMenu" role="menu">
            <a href="#profile" role="menuitem">Profile</a>
            <a href="#help" role="menuitem">Help</a>
            <button id="logout" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <nav class="main-nav" id="mainNav">
    <div class="main-nav-inner">
      <a class="nav-link" href="home.html">Home</a>
      <a class="nav-link" href="index.html">Question Bank</a>
      <a class="nav-link active" href="tests_home.html">Tests</a>
      <a class="nav-link" href="study-material.html">Study Material</a>
      <a class="nav-link" href="chatBot.html">Chatbot</a>
      <span class="nav-spacer"></span>
      <span class="nav-tip">Sharpen your speed with timed papers.</span>
    </div>
  </nav>

  <main class="page" id="page">
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-shape hero-shape--paper hero-shape--paper-a" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--paper hero-shape--paper-b" aria-hidden="true"></div>
      <div class="hero-shape hero-shape--paper hero-shape--paper-c" aria-hidden="true"></div>
      <div class="container">
        <h1 class="hero-title">Choose your subject test</h1>
        <p class="hero-sub">Select a year, then a subject to start its paper.</p>
      </div>
    </section>

    <section class="container section">
      <div class="year-switcher">
        <div class="year-tabs" id="yearTabs" role="tablist" aria-label="Years"></div>
      </div>

      <div class="section-head">
        <h2 class="section-title" id="subject-year-title">Subjects</h2>
      </div>

      <div class="subject-grid" id="subject-list" role="tabpanel" aria-labelledby="yearTabs"></div>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/tests_home.js"></script>
</body>
</html>
